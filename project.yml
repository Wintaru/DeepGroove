name: DeepGroove

options:
  bundleIdPrefix: com.jdonner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: targeted
    ENABLE_HARDENED_RUNTIME: YES

targets:
  DeepGrooveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGrooveTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 9C5WLPGP58
    dependencies:
      - target: DeepGroove

  DeepGroove:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGroove
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DeepGroove/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove
        PRODUCT_NAME: "Deep Groove"
        DEVELOPMENT_TEAM: 9C5WLPGP58
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - sdk: StoreKit.framework
    entitlements:
      path: DeepGroove/DeepGroove.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.jdonner.deepgroove
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.jdonner.deepgroove

schemes:
  DeepGroove:
    build:
      targets:
        DeepGroove: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DeepGrooveTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
