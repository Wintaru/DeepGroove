name: VinylCollector

options:
  bundleIdPrefix: com.vinylcollector
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: targeted
    ENABLE_HARDENED_RUNTIME: YES

targets:
  VinylCollectorTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VinylCollectorTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 9C5WLPGP58
    dependencies:
      - target: VinylCollector

  VinylCollector:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VinylCollector
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: VinylCollector/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.vinylcollector
        DEVELOPMENT_TEAM: 9C5WLPGP58
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    dependencies:
      - sdk: StoreKit.framework
    entitlements:
      path: VinylCollector/VinylCollector.entitlements
      properties:
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.jdonner.vinylcollector
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.jdonner.vinylcollector

schemes:
  VinylCollector:
    build:
      targets:
        VinylCollector: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - VinylCollectorTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
