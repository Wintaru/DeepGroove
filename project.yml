name: DeepGroove

options:
  bundleIdPrefix: com.jdonner
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: targeted
    ENABLE_HARDENED_RUNTIME: YES

targets:
  DeepGrooveShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGrooveShareExtension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: targeted
        INFOPLIST_FILE: DeepGrooveShareExtension/Info.plist
        PRODUCT_NAME: DeepGrooveShareExtension
        DEVELOPMENT_TEAM: 9C5WLPGP58
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks @executable_path/../Frameworks"
        CODE_SIGN_ENTITLEMENTS: DeepGrooveShareExtension/DeepGrooveShareExtension.entitlements
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove.debug.shareextension
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove.shareextension

  DeepGrooveTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGrooveTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 9C5WLPGP58
    dependencies:
      - target: DeepGroove

  DeepGrooveWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGrooveWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        SWIFT_VERSION: "5.10"
        SWIFT_STRICT_CONCURRENCY: targeted
        INFOPLIST_FILE: DeepGrooveWidget/Info.plist
        PRODUCT_NAME: DeepGrooveWidget
        DEVELOPMENT_TEAM: 9C5WLPGP58
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks @executable_path/../Frameworks"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove.debug.widget
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove.widget
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  DeepGroove:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DeepGroove
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DeepGroove/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: "Deep Groove"
        DEVELOPMENT_TEAM: 9C5WLPGP58
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove.debug
          APP_DISPLAY_NAME: "Deep Groove Dev"
          CODE_SIGN_ENTITLEMENTS: DeepGroove/DeepGroove.Debug.entitlements
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.jdonner.deepgroove
          APP_DISPLAY_NAME: "Deep Groove"
          CODE_SIGN_ENTITLEMENTS: DeepGroove/DeepGroove.entitlements
    dependencies:
      - sdk: StoreKit.framework
      - target: DeepGrooveWidget
        embed: true
        codeSign: true
      - target: DeepGrooveShareExtension
        embed: true
        codeSign: true

schemes:
  DeepGroove:
    build:
      targets:
        DeepGroove: all
        DeepGrooveWidget: all
        DeepGrooveShareExtension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DeepGrooveTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
